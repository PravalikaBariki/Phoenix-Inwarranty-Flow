name: Postman Collection Workflow
  
on: 
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
      - cron: 30 02 * * * #8am IST Every Day
      - cron: 30 13 * * * #7pm IST Every Day
      - cron: 00 06 * * 1-5 
jobs:
  run-postman-tests:
   runs-on: ubuntu-latest

   steps:
     - name: Checkout the code
       uses: actions/checkout@v6.0.2

     - name: Install Node.js and npm
       uses: actions/setup-node@v6
       with: 
         node-version: '22'

     - name: Install Newman and Html-extra globally
       run:  |
             npm install -g newman
             npm install -g newman-reporter-htmlextra
     - name: Run the Postman Collection with newman
       run:  |
             newman run 'Inwarranty-flow-connection.postman_collection.json' \
             -e QA.postman_environment.json \
             -d testdata.csv \
             -r cli,htmlextra \
             --reporter-htmlextra-export ./newman/index.html
     - name: Newman Report 
       if: always()
       uses: actions/upload-artifact@v7.0.0
       with:
         name: Newman Report
         path: newman/*.html
     - name: Creating github page branch
       if: always()
       uses: peaceiris/actions-gh-pages@v4.0.0
       with:
         github_token: ${{ secrets.GITHUB_TOKEN }}
         publish_dir: newman/
     - name: Send Email Notification
       if: always()
       uses: dawidd6/action-send-mail@v11
       with:
         server_address: smtp.gmail.com
         server_port: 465
         username: ${{ secrets.EMAIL_USERNAME }}
         password: ${{ secrets.EMAIL_PASSWORD }}
         subject: Phoenix Inwarranty Flow Test Execution Notification
         to: pravalikabariki342@gmail.com,
         from: ${{ secrets.EMAIL_USERNAME }}
         body: |
               Hi,
               Phoenix Inwarranty flow tests has been executed. The Report has been published and the URL 
               is: https://pravalikabariki.github.io/Phoenix-Inwarranty-Flow/
         
         
       
         

















  
